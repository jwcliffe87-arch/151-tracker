<!DOCTYPE html>
<html>
<head>

<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
}

.header {
  padding: 8px;
  text-align: center;
}

#logo {
  width: 100%;
  max-width: 260px;
  margin: 0 auto 10px auto;
  display: block;
}

.bar {
  height: 10px;
  background: #333;
  border-radius: 6px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
}

/* TABS */
.tabs {
  display: flex;
  gap: 5px;
  padding: 6px;
}

.tabs button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
}

.tabs button.active {
  box-shadow: 0 0 10px currentColor;
}

#tab-normal.active { background: #888; }
#tab-poke.active { background: #e53935; }
#tab-master.active { background: #8e24aa; }
#tab-extra.active { background: #1e88e5; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

/* CARD */
.card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: contain;
  background: black;
  border-radius: 6px;
  cursor: pointer;
}

.card div:first-child {
  height: 48px;
  font-size: 14px;
  line-height: 1.2;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;

  overflow: hidden;
}
  
/* BUTTON */
button.card-btn {
  margin-top: 4px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  color: white;
}

.missing {
  background: #444;
}

/* ZOOM */
.overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.overlay img {
  width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="totalText"></div>
<div id="progress"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <img id="zoomImg">
</div>

<script>

let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";
let filtered = [];
let index = 0;

/* SET VIEW */
function setView(view){
  currentView=view;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+view).classList.add("active");

  render();
}

/* LOAD CARDS */
async function loadCards(){
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  cards = data.data
    .map(c => ({id:c.id, num:parseInt(c.number), data:c}))
    .sort((a,b)=>a.num-b.num);

  render();
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML="";
  filtered=[];

  let count = 0;
let totalOwned = 0;

  cards.forEach(card=>{

    const isExtra = card.num > 165;

    if(currentView==="extra" && !isExtra) return;
    if(currentView!=="extra" && isExtra) return;

    if(!saved[card.id]) {
      saved[card.id]={normal:false,poke:false,master:false,extra:false};
    }

    filtered.push(card);

    const owned = saved[card.id][currentView];

    if(owned) count++;
if (saved[card.id].normal) totalOwned++;
if (saved[card.id].poke) totalOwned++;
if (saved[card.id].master) totalOwned++;
if (saved[card.id].extra) totalOwned++;
    
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<div>#${card.num} ${card.data.name}</div>`;

    const img=document.createElement("img");
    img.src=card.data.images.small;

    img.onclick=()=>{
      index=filtered.indexOf(card);
      showZoom();
    };

    div.appendChild(img);

    const btn=document.createElement("button");

    btn.className="card-btn "+(owned?"owned":"missing");
    btn.textContent = owned ? "✔" : "Needed";

    /* 🎨 COLOUR LOGIC */
    let color = "#888";
    if (currentView === "poke") color = "#e53935";
    if (currentView === "master") color = "#8e24aa";
    if (currentView === "extra") color = "#1e88e5";

    if (owned) {
      btn.style.background = color;
    }

    btn.onclick=()=>{
      if (!saved[card.id]) {
        saved[card.id]={normal:false,poke:false,master:false,extra:false};
      }

      saved[card.id][currentView] = !saved[card.id][currentView];

      localStorage.setItem("collection", JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  let totalPerTab = 165;
if (currentView === "extra") totalPerTab = 45;

const viewNames = {
  normal: "Normal",
  poke: "Pokéball",
  master: "Masterball",
  extra: "Extras"
};

document.getElementById("progress").innerHTML =
  viewNames[currentView] + ": " + count + " / " + totalPerTab;

document.getElementById("totalText").innerHTML =
  "TOTAL: " + totalOwned + " / 540";

  document.getElementById("fill").style.width =
    (count/filtered.length*100)+"%";

  /* 🎨 BAR COLOUR */
  let barColor = "#888";
  if (currentView === "poke") barColor = "#e53935";
  if (currentView === "master") barColor = "#8e24aa";
  if (currentView === "extra") barColor = "#1e88e5";

  document.getElementById("fill").style.background = barColor;
}

/* ZOOM */
function showZoom(){
  document.getElementById("zoomImg").src =
    filtered[index].data.images.large;

  document.getElementById("overlay").style.display="flex";
}

document.getElementById("overlay").onclick=()=>{
  document.getElementById("overlay").style.display="none";
};

/* SWIPE */
let startX=0;

overlay.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

overlay.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientX-startX;

  if(Math.abs(diff)>50){
    if(diff<0) index=(index+1)%filtered.length;
    else index=(index-1+filtered.length)%filtered.length;

    showZoom();
  }
});

loadCards();

</script>

</body>
</html>
