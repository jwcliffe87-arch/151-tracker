<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#0d0d0d; color:white; margin:0; }

.header { padding:8px; text-align:center; }

#logo {
  width:100%;
  max-width:260px;
  margin:0 auto 10px auto;
  display:block;
}

.bar { height:10px; background:#333; border-radius:6px; overflow:hidden; }
.fill { height:100%; width:0%; }

.tabs { display:flex; gap:5px; padding:6px; }

.tabs button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

.tabs button.active { box-shadow:0 0 10px currentColor; }

#tab-normal.active { background:#888; }
#tab-poke.active { background:#e53935; }
#tab-master.active { background:#8e24aa; }
#tab-extra.active { background:#1e88e5; }

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:6px;
}

.card {
  background:#1a1a1a;
  border-radius:10px;
  padding:6px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card div:first-child {
  height:48px;
  font-size:14px;
  line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card img {
  width:100%;
  height:140px;
  object-fit:contain;
  background:black;
  border-radius:6px;
}

button.card-btn {
  margin-top:4px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  color:white;
}

.missing { background:#444; }
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="totalText"></div>
  <div id="progress"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<div class="grid" id="grid"></div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";

const totals = { normal:165, poke:165, master:165, extra:45 };
const names = {
  normal:"Normal",
  poke:"Pokéball",
  master:"Masterball",
  extra:"Extras"
};

async function loadCards(){
  try {
    const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
    const data = await res.json();

    cards = [];

    // ADD API CARDS
    data.data.forEach(c => {
      cards.push({
        id: c.id,
        num: parseInt(c.number) || 0,
        data: c
      });
    });

    // ADD PROMOS (at end using high numbers)
    cards.push(
      { id:"snorlax", num:9991, data:{name:"Snorlax", images:{small:"https://i.postimg.cc/9Qr4BCBh/snorlax.png"}}},
      { id:"mewtwo", num:9992, data:{name:"Mewtwo", images:{small:"https://i.postimg.cc/YCh4xMz1/mewtwo.png"}}},
      { id:"mewex", num:9993, data:{name:"Mew ex", images:{small:"https://i.postimg.cc/c41trQg1/mew.png"}}}
    );

    // SORT
    cards.sort((a,b)=>a.num-b.num);

    // FIX 152–165 ORDER
    const correctOrder = [162,159,152,154,153,163,164,155,165,158,160,161,156,157];

    let section = cards.filter(c => c.num >= 152 && c.num <= 165);

    let reordered = [];
    correctOrder.forEach(n=>{
      let found = section.find(c => c.num === n);
      if(found) reordered.push(found);
    });

    let before = cards.filter(c => c.num < 152);
    let after = cards.filter(c => c.num > 165);

    cards = [...before, ...reordered, ...after];
// 🔥 FIX EXTRA ORDER (PLACE PROMOS CORRECTLY)

// remove promos from end
let promos = cards.filter(c =>
  c.id === "snorlax" || c.id === "mewtwo" || c.id === "mewex"
);

cards = cards.filter(c =>
  c.id !== "snorlax" && c.id !== "mewtwo" && c.id !== "mewex"
);

// split extras
let main = cards.filter(c => c.num <= 165);
let extras = cards.filter(c => c.num > 165);

// insert promos into correct positions
// based on your mapping

// Snorlax at position 181 → index 15 in extras (181-166)
extras.splice(15, 0, promos.find(p => p.id === "snorlax"));

// Mewtwo at 183 → index 17
extras.splice(17, 0, promos.find(p => p.id === "mewtwo"));

// Mew ex at 205 → index 39
extras.splice(39, 0, promos.find(p => p.id === "mewex"));

// rebuild cards
cards = [...main, ...extras];
    render();

  } catch(e){
    alert("Error loading cards");
    console.error(e);
  }
}

function setView(view){
  currentView=view;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+view).classList.add("active");

  render();
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let count=0,totalOwned=0;

  cards.forEach(card=>{

    const isExtra = card.num > 165;

    if(currentView==="extra" && !isExtra) return;
    if(currentView!=="extra" && isExtra) return;

    if(!saved[card.id]){
      saved[card.id]={normal:false,poke:false,master:false,extra:false};
    }

    const owned = saved[card.id][currentView];
    if(owned) count++;

    ["normal","poke","master","extra"].forEach(v=>{
      if(saved[card.id][v]) totalOwned++;
    });

    const div=document.createElement("div");
    div.className="card";

    // 🔥 FIX DISPLAY NUMBERS
    let displayNum = card.num;
    if(card.id==="snorlax") displayNum=181;
    if(card.id==="mewtwo") displayNum=183;
    if(card.id==="mewex") displayNum=205;

    div.innerHTML=`<div>#${displayNum} ${card.data.name}</div>`;

    const img=document.createElement("img");
    img.src=card.data.images.small;

    div.appendChild(img);

    const btn=document.createElement("button");
    btn.className="card-btn "+(owned?"owned":"missing");
    btn.textContent=owned?"✔":"Needed";

    let color="#888";
    if(currentView==="poke") color="#e53935";
    if(currentView==="master") color="#8e24aa";
    if(currentView==="extra") color="#1e88e5";

    if(owned) btn.style.background=color;

    btn.onclick=()=>{
      saved[card.id][currentView]=!saved[card.id][currentView];
      localStorage.setItem("collection",JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  document.getElementById("progress").innerHTML =
    names[currentView]+" "+count+" / "+totals[currentView];

  document.getElementById("totalText").innerHTML =
    "TOTAL "+totalOwned+" / 540";

  document.getElementById("fill").style.width =
    (count/totals[currentView]*100)+"%";
}

loadCards();

</script>

</body>
</html>
