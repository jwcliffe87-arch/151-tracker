<!DOCTYPE html>
<html>
<head>

<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; background:#0d0d0d; color:white; margin:0; }
.header { padding:8px; text-align:center; position:relative; }

#logo {
  width:100%;
  max-width:260px;
  margin:0 auto 10px auto;
  display:block;
}

.bar { height:10px; background:#333; border-radius:6px; overflow:hidden; }

.fill {
  height:100%;
  width:0%;
  transition:width 0.3s ease;
}

.tabs { display:flex; gap:5px; padding:6px; }

.tabs button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

.tabs button.active { box-shadow:0 0 10px currentColor; }

#tab-normal.active { background:#ffffff; color:black; }
#tab-poke.active { background:#e53935; }
#tab-master.active { background:#8e24aa; }
#tab-extra.active { background:#1e88e5; }

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:6px;
}

.card {
  background:#1a1a1a;
  border-radius:10px;
  padding:6px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card div:first-child {
  height:48px;
  font-size:14px;
  line-height:1.2;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card img {
  width:100%;
  height:140px;
  object-fit:contain;
  background:black;
  border-radius:6px;
}

button.card-btn {
  margin-top:4px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  color:white;
}

.missing { background:#444; }

.reset-icon {
  position:absolute;
  top:10px;
  right:10px;
  background:#222;
  color:white;
  border:none;
  border-radius:50%;
  width:36px;
  height:36px;
  font-size:18px;
  opacity:0.6;
}

.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.overlay img {
  width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">

  <!-- 🔥 TOTAL BACK -->
  <div id="totalText"></div>

  <!-- TAB -->
  <div id="progress"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>

  <button class="reset-icon" onclick="resetData()">⚙️</button>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<div class="grid" id="grid"></div>

<div id="overlay" class="overlay" onclick="closeOverlay()">
  <img id="overlayImg">
</div>

<script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";
let currentIndex = 0;

const totals = { normal:165, poke:165, master:165, extra:45 };
const names = {
  normal:"Normal",
  poke:"Pokéball",
  master:"Masterball",
  extra:"Extras"
};

function resetData(){
  if(confirm("Reset all progress?")){
    localStorage.removeItem("collection");
    location.reload();
  }
}

async function loadCards(){
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  cards = data.data.map(c => ({
    id: c.id,
    num: parseInt(c.number) || 0,
    data: c
  })).sort((a,b)=>a.num-b.num);

  const fix = [162,159,152,154,153,163,164,155,165,158,160,161,156,157];
  let mid = cards.filter(c => c.num >=152 && c.num<=165);
  let reordered = [];
  fix.forEach(n=>{
    let f = mid.find(c=>c.num===n);
    if(f) reordered.push(f);
  });

  cards = [
    ...cards.filter(c=>c.num<152),
    ...reordered,
    ...cards.filter(c=>c.num>165)
  ];

  let main = cards.filter(c=>c.num<=165);
  let extras = cards.filter(c=>c.num>165).sort((a,b)=>a.num-b.num);

  extras.splice(15,0,{id:"promo-snorlax",data:{name:"Snorlax",images:{small:"https://i.postimg.cc/9Qr4BCBh/snorlax.png"}}});
  extras.splice(17,0,{id:"promo-mewtwo",data:{name:"Mewtwo",images:{small:"https://i.postimg.cc/YCh4xMz1/mewtwo.png"}}});
  extras.splice(39,0,{id:"promo-mewex",data:{name:"Mew ex",images:{small:"https://i.postimg.cc/c41trQg1/mew.png"}}});

  cards = [...main, ...extras];

  let ex = cards.slice(165);
  let moved = ex.splice(30,1)[0];
  ex.splice(33,0,moved);
  cards = [...cards.slice(0,165), ...ex];

  render();
}

function setView(view){
  currentView=view;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+view).classList.add("active");
  render();
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let count=0;
  let totalOwned=0;

  cards.forEach((card,index)=>{

    const key = "card-"+(index+1);
    const displayNum = index+1;
    const isExtra = displayNum>165;

    if(!saved[key]){
      saved[key]={normal:false,poke:false,master:false,extra:false};
    }

    ["normal","poke","master","extra"].forEach(v=>{
      if(saved[key][v]) totalOwned++;
    });

    if(currentView==="extra"&&!isExtra) return;
    if(currentView!=="extra"&&isExtra) return;

    const owned = saved[key][currentView];
    if(owned) count++;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<div>#${displayNum} ${card.data.name}</div>`;

    const img=document.createElement("img");
    img.src=card.data.images.small;
    img.onclick=()=>openOverlay(index);
    div.appendChild(img);

    const btn=document.createElement("button");
    btn.className="card-btn "+(owned?"owned":"missing");

    // 🔥 BLACK TICK FOR NORMAL
    btn.textContent=owned?"✔":"Needed";

    let color="#ffffff";
    let textColor="white";

    if(currentView==="poke") color="#e53935";
    if(currentView==="master") color="#8e24aa";
    if(currentView==="extra") color="#1e88e5";

    if(currentView==="normal") textColor="black";

    if(owned){
      btn.style.background=color;
      btn.style.color=textColor;
    }

    btn.onclick=()=>{
      saved[key][currentView]=!saved[key][currentView];
      localStorage.setItem("collection",JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  document.getElementById("progress").innerHTML =
    names[currentView]+" "+count+" / "+totals[currentView];

  document.getElementById("totalText").innerHTML =
    "TOTAL "+totalOwned+" / 540";

  const percent = (count / totals[currentView]) * 100;

  let barColor = "#ffffff";
  if(currentView==="poke") barColor="#e53935";
  if(currentView==="master") barColor="#8e24aa";
  if(currentView==="extra") barColor="#1e88e5";

  const fill = document.getElementById("fill");
  fill.style.width = percent + "%";
  fill.style.background = barColor;
}

// overlay unchanged
function openOverlay(index){
  currentIndex=index;
  document.getElementById("overlay").style.display="flex";
  updateOverlay();
}

function closeOverlay(){
  document.getElementById("overlay").style.display="none";
}

function updateOverlay(){
  document.getElementById("overlayImg").src =
    cards[currentIndex].data.images.large || cards[currentIndex].data.images.small;
}

let startX=0;

document.getElementById("overlay").addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.getElementById("overlay").addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;

  if(endX-startX>50){
    currentIndex=Math.max(0,currentIndex-1);
    updateOverlay();
  }

  if(startX-endX>50){
    currentIndex=Math.min(cards.length-1,currentIndex+1);
    updateOverlay();
  }
});

loadCards();

</script>

</body>
</html>
