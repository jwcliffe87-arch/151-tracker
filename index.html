<!DOCTYPE html>
<html>
<head>

<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
}

/* HEADER */
.header {
  padding: 6px;
  text-align: center;
}

#logo {
  width: 100%;
  max-width: 260px;
  display: block;
  margin: 0 auto 8px auto;
}

#totalText {
  font-size: 14px;
  color: #aaa;
}

#progressText {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 6px;
}

/* BAR */
.bar {
  height: 10px;
  background: #333;
  border-radius: 6px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  transition: width 0.3s ease;
}

/* TABS */
.tabs {
  display: flex;
  gap: 5px;
  padding: 6px;
}

.tabs button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
  font-size: 12px;
}

.tabs button.active {
  box-shadow: 0 0 10px currentColor;
}

#tab-normal.active { background: #888 !important; }
#tab-poke.active { background: #e53935 !important; }
#tab-master.active { background: #8e24aa !important; }
#tab-extra.active { background: #1e88e5 !important; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.card div {
  font-size: 12px;
  margin-bottom: 4px;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: contain;
  background: black;
  border-radius: 6px;
  cursor: pointer;
}

/* BUTTON */
button.card-btn {
  margin-top: 4px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
}

.owned { color: white; }
.missing { background: #444; color: white; }

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;

  opacity: 0;
  transition: opacity 0.25s ease;
}

.overlay.show {
  opacity: 1;
}

.overlay img {
  width: 95%;
  max-height: 95%;
  border-radius: 10px;
  transform: scale(0.9);
  transition: transform 0.25s ease;
}

.overlay.show img {
  transform: scale(1);
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="totalText"></div>
  <div id="progressText"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <img id="zoomImg">
</div>

<script>

/* 🔥 VERSION (forces cache refresh) */
const VERSION = "1.3";

/* REGISTER SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";

let filteredCards = [];
let currentIndex = 0;
let startX = 0;

const totals = {
  normal: 165,
  poke: 165,
  master: 165,
  extra: 45
};

const names = {
  normal: "Normal",
  poke: "Pokéball",
  master: "Masterball",
  extra: "Extras"
};

/* ORDER */
const numberMap = {
  162:152,159:153,152:154,154:155,153:156,163:157,
  164:158,155:159,165:160,161:163,156:164,157:165,
  181:182,208:181,209:183,182:184,183:185,184:186,
  185:187,186:188,187:189,188:190,189:191,190:192,
  191:193,192:194,193:195,194:199,195:196,196:197,
  197:198,198:200,199:201,200:202,201:203,202:204,
  203:206,204:207,205:208,206:209,207:210,210:205
};

const overrides = {158:161,160:162};

const customImages = {
  181: "https://i.postimg.cc/9Qr4BCBh/snorlax.png",
  183: "https://i.postimg.cc/YCh4xMz1/mewtwo.png",
  205: "https://i.postimg.cc/c41trQg1/mew.png"
};

const customNames = {
  181: "Snorlax",
  183: "Mewtwo",
  205: "Mew ex"
};

function setView(view) {
  currentView = view;
  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-" + view).classList.add("active");
  render();
}

async function loadCards() {
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  let temp = [];

  for (let i = 1; i <= 210; i++) {
    const found = data.data.find(c => parseInt(c.number) === i);

    let display = numberMap[i] || i;
    if (overrides[i]) display = overrides[i];

    temp.push({
      original: i,
      display,
      data: found || null
    });
  }

  cards = temp.sort((a, b) => a.display - b.display);
  setView("normal");
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let count = 0;
  let totalOwned = 0;

  filteredCards = [];

  cards.forEach(card => {

    const isMain = card.display <= 165;

    if (currentView === "extra" && isMain) return;
    if (currentView !== "extra" && !isMain) return;

    const id = card.data ? card.data.id : "missing-" + card.original;

    if (!saved[id]) {
      saved[id] = { normal:false, poke:false, master:false, extra:false };
    }

    filteredCards.push(card);

    if (saved[id][currentView]) count++;

    if (saved[id].normal) totalOwned++;
    if (saved[id].poke) totalOwned++;
    if (saved[id].master) totalOwned++;
    if (saved[id].extra) totalOwned++;

    const name =
      customNames[card.display] ||
      (card.data ? card.data.name : "Unknown");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<div>#${card.display} ${name}</div>`;

    const img = document.createElement("img");

    const imgSrc =
      customImages[card.display] ||
      card.data?.images?.small;

    if (imgSrc) {
      img.src = imgSrc;

      img.onclick = () => {
        currentIndex = filteredCards.findIndex(c => c.display === card.display);
        showZoom();
      };
    }

    div.appendChild(img);

    const btn = document.createElement("button");
    btn.className = "card-btn " + (saved[id][currentView] ? "owned" : "missing");
    btn.textContent = saved[id][currentView] ? "✔" : "Needed";

    btn.onclick = () => {
      saved[id][currentView] = !saved[id][currentView];
      localStorage.setItem("collection", JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  const total = totals[currentView];

  document.getElementById("progressText").innerHTML =
    names[currentView] + ": " + count + " / " + total;

  document.getElementById("totalText").innerHTML =
    "TOTAL: " + totalOwned + " / 540";

  const percent = (count / total * 100);
  document.getElementById("fill").style.width = percent + "%";

  let color = "#888";
  if (currentView === "poke") color = "#e53935";
  if (currentView === "master") color = "#8e24aa";
  if (currentView === "extra") color = "#1e88e5";

  document.getElementById("fill").style.background = color;

  document.querySelectorAll(".owned").forEach(btn => {
    btn.style.background = color;
  });
}

/* ZOOM */
function showZoom() {
  const card = filteredCards[currentIndex];

  const imgSrc =
    customImages[card.display] ||
    card.data?.images?.large;

  document.getElementById("zoomImg").src = imgSrc;

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";

  setTimeout(() => overlay.classList.add("show"), 10);
}

document.getElementById("overlay").onclick = () => {
  const overlay = document.getElementById("overlay");
  overlay.classList.remove("show");

  setTimeout(() => {
    overlay.style.display = "none";
  }, 200);
};

/* SWIPE */
const overlay = document.getElementById("overlay");

overlay.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

overlay.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;

  if (Math.abs(diff) > 50) {
    if (diff < 0) currentIndex = (currentIndex + 1) % filteredCards.length;
    else currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;

    showZoom();
  }
});

loadCards();

</script>

</body>
</html>
