<!DOCTYPE html>
<html>
<head>

<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">

<style>
body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
}

.header {
  padding: 6px;
  text-align: center;
}

#logo {
  width: 100%;
  max-width: 260px;
  margin: 0 auto 8px auto;
  display: block;
}

#totalText { font-size: 14px; color: #aaa; }
#progressText { font-size: 18px; font-weight: bold; margin-bottom: 6px; }

.bar {
  height: 10px;
  background: #333;
  border-radius: 6px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  transition: 0.3s;
}

.tabs {
  display: flex;
  gap: 5px;
  padding: 6px;
}

.tabs button {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  background: #333;
  color: white;
}

.tabs button.active {
  box-shadow: 0 0 10px currentColor;
}

#tab-normal.active { background: #888; }
#tab-poke.active { background: #e53935; }
#tab-master.active { background: #8e24aa; }
#tab-extra.active { background: #1e88e5; }

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 6px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: contain;
  background: black;
  border-radius: 6px;
  cursor: pointer;
}

button.card-btn {
  margin-top: 4px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 6px;
}

.owned {
  background: #4caf50;
  color: white;
}

.missing {
  background: #444;
  color: white;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  opacity:0;
  transition:0.25s;
}

.overlay.show { opacity:1; }

.overlay img {
  width:95%;
  max-height:95%;
  transform:scale(0.9);
  transition:0.25s;
}

.overlay.show img {
  transform:scale(1);
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="totalText"></div>
  <div id="progressText"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <img id="zoomImg">
</div>

<script>

/* SERVICE WORKER */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";

let filteredCards = [];
let currentIndex = 0;
let startX = 0;

const totals = {
  normal:165, poke:165, master:165, extra:45
};

const names = {
  normal:"Normal",
  poke:"Pokéball",
  master:"Masterball",
  extra:"Extras"
};

/* ORDER */
const numberMap = {
  162:152,159:153,152:154,154:155,153:156,163:157,
  164:158,155:159,165:160,161:163,156:164,157:165,
  181:182,208:181,209:183,182:184,183:185,184:186,
  185:187,186:188,187:189,188:190,189:191,190:192,
  191:193,192:194,193:195,194:199,195:196,196:197,
  197:198,198:200,199:201,200:202,201:203,202:204,
  203:206,204:207,205:208,206:209,207:210,210:205
};

const overrides = {158:161,160:162};

/* FIX DATA */
function fixSaved(id){
  if (!saved[id]) saved[id] = {};
  ["normal","poke","master","extra"].forEach(k=>{
    if (typeof saved[id][k] !== "boolean") saved[id][k] = false;
  });
}

function setView(view){
  currentView=view;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+view).classList.add("active");
  render();
}

async function loadCards(){
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  let temp=[];

  for(let i=1;i<=210;i++){
    const found = data.data.find(c=>parseInt(c.number)===i);
    let display = overrides[i] || numberMap[i] || i;
    temp.push({original:i, display, data:found||null});
  }

  cards=temp.sort((a,b)=>a.display-b.display);
  setView("normal");
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let count=0, totalOwned=0;
  filteredCards=[];

  cards.forEach(card=>{

    const isMain = card.display<=165;
    if (currentView==="extra" && isMain) return;
    if (currentView!=="extra" && !isMain) return;

    const id = card.data ? card.data.id : "missing-"+card.original;

    fixSaved(id);
    filteredCards.push(card);

    const isOwned = saved[id][currentView] === true;

    if (isOwned) count++;

    ["normal","poke","master","extra"].forEach(k=>{
      if(saved[id][k]) totalOwned++;
    });

    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<div>#${card.display} ${card.data?.name||"Unknown"}</div>`;

    const img=document.createElement("img");
    img.src = card.data?.images?.small || "";

    img.onclick=()=>{
      currentIndex = filteredCards.findIndex(c=>c.display===card.display);
      showZoom();
    };

    div.appendChild(img);

    const btn=document.createElement("button");
    btn.className="card-btn "+(isOwned?"owned":"missing");
    btn.textContent = isOwned?"✔":"Needed";

    btn.onclick=()=>{
      saved[id][currentView] = !saved[id][currentView];
      localStorage.setItem("collection", JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  document.getElementById("progressText").innerHTML =
    names[currentView]+" "+count+" / "+totals[currentView];

  document.getElementById("totalText").innerHTML =
    "TOTAL: "+totalOwned+" / 540";

  document.getElementById("fill").style.width =
    (count/totals[currentView]*100)+"%";
}

/* ZOOM */
function showZoom(){
  const card = filteredCards[currentIndex];
  document.getElementById("zoomImg").src =
    card.data?.images?.large || card.data?.images?.small;

  const o=document.getElementById("overlay");
  o.style.display="flex";
  setTimeout(()=>o.classList.add("show"),10);
}

document.getElementById("overlay").onclick=()=>{
  const o=document.getElementById("overlay");
  o.classList.remove("show");
  setTimeout(()=>o.style.display="none",200);
};

/* SWIPE */
const overlay=document.getElementById("overlay");

overlay.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

overlay.addEventListener("touchend",e=>{
  const diff=e.changedTouches[0].clientX-startX;

  if(Math.abs(diff)>50){
    if(diff<0) currentIndex=(currentIndex+1)%filteredCards.length;
    else currentIndex=(currentIndex-1+filteredCards.length)%filteredCards.length;

    showZoom();
  }
});

loadCards();

</script>

</body>
</html>
