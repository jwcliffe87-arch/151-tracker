<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<title>151 Korean Master Set Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #0d0d0d;
  color: white;
  margin: 0;
}

/* HEADER */
header {
  padding: 8px;
  position: sticky;
  top: 0;
  background: #111;
}

#logo {
  width: 100%;
  max-width: 400px;
  display: block;
  margin: 0 auto 8px auto;
}

#progress {
  font-size: 20px;
  text-align: center;
}

.bar {
  height: 10px;
  background: #333;
  border-radius: 5px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

/* BUTTON */
#toggleMissingBtn {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border: none;
  border-radius: 5px;
  background: #444;
  color: white;
  font-size: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 6px;
}

/* CARD */
.card {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 6px;
  text-align: center;
}

.card div:first-child {
  font-size: 13px;
  margin-bottom: 4px;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 170px;
  object-fit: contain;
  background: #000;
  border-radius: 6px;
}

/* BUTTONS */
button {
  margin-top: 4px;
  width: 100%;
  padding: 6px;
  border: none;
  border-radius: 5px;
  font-size: 13px;
}

.owned { background: #4caf50; }
.missing { background: #444; color: white; }

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.overlay img {
  width: 95%;
  max-height: 95%;
}
</style>
</head>

<body>

<header>
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="progress"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>

  <button id="toggleMissingBtn" onclick="toggleMissingView()">
    Show Wish List
  </button>
</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <img id="zoomImg">
</div>

<script>

const saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
const TOTAL = 210;

let showMissingOnly = false;

/* ORDER FIX */
const numberMap = {
  162:152,159:153,152:154,154:155,153:156,163:157,
  164:158,155:159,165:160,161:163,156:164,157:165,
  181:182,208:181,209:183,182:184,183:185,184:186,
  185:187,186:188,187:189,188:190,189:191,190:192,
  191:193,192:194,193:195,194:199,195:196,196:197,
  197:198,198:200,199:201,200:202,201:203,202:204,
  203:206,204:207,205:208,206:209,207:210,210:205
};

const overrides = {158:161,160:162};

/* CUSTOM CARDS */
const customImages = {
  181: "https://i.postimg.cc/9Qr4BCBh/snorlax.png",
  183: "https://i.postimg.cc/YCh4xMz1/mewtwo.png",
  205: "https://i.postimg.cc/c41trQg1/mew.png"
};

const customNames = {
  181: "Snorlax",
  183: "Mewtwo",
  205: "Mew ex"
};

/* TOGGLE VIEW */
function toggleMissingView() {
  showMissingOnly = !showMissingOnly;

  document.getElementById("toggleMissingBtn").textContent =
    showMissingOnly ? "Show All Cards" : "Show Wish List";

  render();
}

/* LOAD */
async function loadCards() {
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  let temp = [];

  for (let i = 1; i <= TOTAL; i++) {
    const found = data.data.find(c => parseInt(c.number) === i);

    let display = numberMap[i] || i;
    if (overrides[i]) display = overrides[i];

    temp.push({
      original: i,
      display,
      data: found || null
    });
  }

  cards = temp.sort((a, b) => a.display - b.display);
  render();
}

/* RENDER */
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  let ownedCount = 0;

  cards.forEach(card => {

    const id = card.data ? card.data.id : "missing-" + card.original;

    if (!saved[id]) saved[id] = false;

    if (saved[id]) ownedCount++;

    if (showMissingOnly && saved[id]) return;

    const name =
      customNames[card.display] ||
      (card.data ? card.data.name : "Unknown");

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<div>#${card.display} ${name}</div>`;

    const img = document.createElement("img");

    if (customImages[card.display]) {
      img.src = customImages[card.display];
    } else if (card.data) {
      img.src = card.data.images.small;
    }

    img.onclick = () => {
      document.getElementById("zoomImg").src =
        card.data?.images?.large || img.src;

      document.getElementById("overlay").style.display = "flex";
    };

    div.appendChild(img);

    const btn = document.createElement("button");
    btn.className = saved[id] ? "owned" : "missing";
    btn.textContent = saved[id] ? "✔" : "Needed";

    btn.onclick = () => {
      saved[id] = !saved[id];
      localStorage.setItem("collection", JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  document.getElementById("progress").innerHTML =
    ownedCount + " / " + TOTAL;

  document.getElementById("fill").style.width =
    (ownedCount / TOTAL * 100) + "%";
}

/* CLOSE OVERLAY */
document.getElementById("overlay").onclick = () => {
  document.getElementById("overlay").style.display = "none";
};

loadCards();

</script>

</body>
</html>
