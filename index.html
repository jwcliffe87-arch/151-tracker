<!DOCTYPE html>
<html>
<head>

<title>151 Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; background:#0d0d0d; color:white; margin:0; }
.header { padding:8px; text-align:center; position:relative; }

#logo {
  width:100%;
  max-width:260px;
  margin:0 auto 10px auto;
  display:block;
}

.bar { height:10px; background:#333; border-radius:6px; overflow:hidden; }

.fill {
  height:100%;
  width:0%;
  transition:width 0.3s ease;
}

.tabs { display:flex; gap:5px; padding:6px; }

.tabs button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
}

.tabs button.active { box-shadow:0 0 10px currentColor; }

#tab-normal.active { background:#ffffff; color:black; }
#tab-poke.active { background:#e53935; }
#tab-master.active { background:#8e24aa; }
#tab-extra.active { background:#1e88e5; }

#wishlistToggle {
  width:90%;
  margin:6px auto;
  display:block;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#444;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:6px;
}

.card {
  background:#1a1a1a;
  border-radius:10px;
  padding:6px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card div:first-child {
  height:48px;
  font-size:14px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:140px;
  object-fit:contain;
  background:black;
  border-radius:6px;
}

button.card-btn {
  margin-top:4px;
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  color:white;
}

.missing { background:#444; }

.reset-icon {
  position:absolute;
  top:10px;
  right:10px;
  background:#222;
  color:white;
  border:none;
  border-radius:50%;
  width:36px;
  height:36px;
  font-size:18px;
  opacity:0.6;
}

#backTop {
  width:90%;
  margin:20px auto;
  display:block;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
}

.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

.overlay img {
  width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
  <div id="totalText"></div>
  <div id="progress"></div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <button class="reset-icon" onclick="resetData()">⚙️</button>
</div>

<div class="tabs">
  <button id="tab-normal" onclick="setView('normal')">Normal</button>
  <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
  <button id="tab-master" onclick="setView('master')">Masterball</button>
  <button id="tab-extra" onclick="setView('extra')">Extras</button>
</div>

<button id="wishlistToggle" onclick="toggleWishlist()">Show Wishlist</button>

<div class="grid" id="grid"></div>

<button id="backTop" onclick="scrollToTop()">↑ Back to Top</button>

<div id="overlay" class="overlay" onclick="closeOverlay()">
  <img id="overlayImg">
</div>

<script>

let saved = JSON.parse(localStorage.getItem("collection")) || {};
let cards = [];
let currentView = "normal";
let currentIndex = 0;
let showWishlist = false;

const totals = { normal:165, poke:165, master:165, extra:45 };
const names = { normal:"Normal", poke:"Pokéball", master:"Masterball", extra:"Extras" };

function resetData(){
  if(confirm("Reset all progress?")){
    localStorage.removeItem("collection");
    location.reload();
  }
}

function scrollToTop(){
  window.scrollTo({ top:0, behavior:"smooth" });
}

function toggleWishlist(){
  showWishlist = !showWishlist;
  render();
}

async function loadCards(){
  const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
  const data = await res.json();

  cards = data.data.map(c => ({
    id:c.id,
    num:parseInt(c.number)||0,
    data:c
  })).sort((a,b)=>a.num-b.num);

  render();
}

function setView(view){
  currentView=view;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab-"+view).classList.add("active");
  render();
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let count=0;
  let totalOwned=0;
  let wishlistCount=0;

  cards.forEach((card,index)=>{

    const key="card-"+(index+1);

    if(!saved[key]){
      saved[key]={normal:false,poke:false,master:false,extra:false};
    }

    ["normal","poke","master","extra"].forEach(v=>{
      if(saved[key][v]) totalOwned++;
    });

    const owned=saved[key][currentView];
    
    const displayNum = index + 1;
const isExtra = displayNum > 165;

// 🔥 FIX TAB FILTERING
if(currentView==="extra" && !isExtra) return;
if(currentView!=="extra" && isExtra) return;

    if(!owned) wishlistCount++;

    if(showWishlist && owned) return;

    if(owned) count++;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<div>#${index+1} ${card.data.name}</div>`;

    const img=document.createElement("img");
    img.src=card.data.images.small;
    img.onclick=()=>openOverlay(index);
    div.appendChild(img);

    const btn=document.createElement("button");
    btn.className="card-btn "+(owned?"owned":"missing");
    btn.textContent=owned?"✔":"Needed";

    let color="#ffffff";
    let textColor="black";

    if(currentView==="poke"){color="#e53935";textColor="white";}
    if(currentView==="master"){color="#8e24aa";textColor="white";}
    if(currentView==="extra"){color="#1e88e5";textColor="white";}

    if(owned){
      btn.style.background=color;
      btn.style.color=textColor;
    }

    btn.onclick=()=>{
      saved[key][currentView]=!saved[key][currentView];
      localStorage.setItem("collection",JSON.stringify(saved));
      render();
    };

    div.appendChild(btn);
    grid.appendChild(div);
  });

  // 🔢 TEXT
  document.getElementById("progress").innerHTML =
    names[currentView]+" "+count+" / "+totals[currentView];

  document.getElementById("totalText").innerHTML =
    "TOTAL "+totalOwned+" / 540";

  // 🎨 BAR
  const fill=document.getElementById("fill");
  fill.style.width=(count/totals[currentView]*100)+"%";

  let barColor="#ffffff";
  if(currentView==="poke") barColor="#e53935";
  if(currentView==="master") barColor="#8e24aa";
  if(currentView==="extra") barColor="#1e88e5";
  fill.style.background=barColor;

  // ⭐ WISHLIST BUTTON
  const wishBtn=document.getElementById("wishlistToggle");

  let btnColor=barColor;
  let btnTextColor=(currentView==="normal")?"black":"white";

  wishBtn.textContent= showWishlist
    ? `Showing Wishlist (${wishlistCount})`
    : `Show Wishlist (${wishlistCount})`;

  wishBtn.style.background= showWishlist ? btnColor : "#444";
  wishBtn.style.color= showWishlist ? btnTextColor : "white";
}

function openOverlay(i){
  currentIndex=i;
  document.getElementById("overlay").style.display="flex";
  updateOverlay();
}

function closeOverlay(){
  document.getElementById("overlay").style.display="none";
}

function updateOverlay(){
  document.getElementById("overlayImg").src=
    cards[currentIndex].data.images.large || cards[currentIndex].data.images.small;
}

loadCards();

</script>

</body>
</html>
