<!DOCTYPE html>
<html>
<head>
  <title>151 Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      margin: 0;
    }

    .header {
      padding: 8px;
      text-align: center;
    }

    #logo {
      width: 100%;
      max-width: 260px;
      margin: 0 auto 10px auto;
      display: block;
    }

    .bar {
      height: 10px;
      background: #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      background: #888;
    }

    .tabs {
      display: flex;
      gap: 5px;
      padding: 6px;
    }

    .tabs button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      font-size: 12px;
    }

    .tabs button.active {
      box-shadow: 0 0 10px currentColor;
    }

    #tab-normal.active { background: #888; }
    #tab-poke.active { background: #e53935; }
    #tab-master.active { background: #8e24aa; }
    #tab-extra.active { background: #1e88e5; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card div:first-child {
      height: 48px;
      font-size: 14px;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: contain;
      background: black;
      border-radius: 6px;
      cursor: pointer;
    }

    button.card-btn {
      margin-top: 4px;
      width: 100%;
      padding: 6px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 12px;
    }

    .missing {
      background: #444;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .overlay img {
      width: 95%;
      max-height: 95%;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="https://i.postimg.cc/Kjhsytbk/logo.png" id="logo">
    <div id="totalText"></div>
    <div id="progress"></div>
    <div class="bar"><div class="fill" id="fill"></div></div>
  </div>

  <div class="tabs">
    <button id="tab-normal" onclick="setView('normal')">Normal</button>
    <button id="tab-poke" onclick="setView('poke')">Pokéball</button>
    <button id="tab-master" onclick="setView('master')">Masterball</button>
    <button id="tab-extra" onclick="setView('extra')">Extras</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="overlay" id="overlay">
    <img id="zoomImg">
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }

    let saved = JSON.parse(localStorage.getItem("collection")) || {};
    let cards = [];
    let currentView = "normal";
    let filtered = [];
    let index = 0;

    const totals = {
      normal: 165,
      poke: 165,
      master: 165,
      extra: 45
    };

    const names = {
      normal: "Normal",
      poke: "Pokéball",
      master: "Masterball",
      extra: "Extras"
    };

 async function loadCards(){
  try {
    const res = await fetch("https://api.pokemontcg.io/v2/cards?q=set.id:sv3pt5&pageSize=250");
    const data = await res.json();

    // create lookup by number
    const map = {};
    data.data.forEach(c => {
      map[c.number] = c;
    });

    cards = [];

    for (let i = 1; i <= 210; i++) {

      let key = String(i);
      let found = map[key];

      // 🔥 manual fixes for missing promos
      if (!found && i === 181) {
        found = {
          id: "snorlax",
          name: "Snorlax",
          images: { small: "https://i.postimg.cc/9Qr4BCBh/snorlax.png" }
        };
      }

      if (!found && i === 183) {
        found = {
          id: "mewtwo",
          name: "Mewtwo",
          images: { small: "https://i.postimg.cc/YCh4xMz1/mewtwo.png" }
        };
      }

      if (!found && i === 205) {
        found = {
          id: "mewex",
          name: "Mew ex",
          images: { small: "https://i.postimg.cc/c41trQg1/mew.png" }
        };
      }

      if (found) {
        cards.push({
          id: found.id || "custom-" + i,
          num: i,
          data: found
        });
      }
    }

    render();

  } catch (e) {
    alert("Error loading cards");
    console.error(e);
  }
 }

    function setView(view) {
      currentView = view;

      document.querySelectorAll(".tabs button").forEach(btn => {
        btn.classList.remove("active");
      });

      document.getElementById("tab-" + view).classList.add("active");
      render();
    }

    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      filtered = [];

      let count = 0;
      let totalOwned = 0;

      cards.forEach(card => {
        const cardNumber = parseInt(card.num, 10);
        const isExtra = cardNumber > 165;

        if (currentView === "extra" && !isExtra) return;
        if (currentView !== "extra" && isExtra) return;

        if (!saved[card.id]) {
          saved[card.id] = {
            normal: false,
            poke: false,
            master: false,
            extra: false
          };
        }

        filtered.push(card);

        const owned = saved[card.id][currentView];

        if (owned) count++;

        if (saved[card.id].normal) totalOwned++;
        if (saved[card.id].poke) totalOwned++;
        if (saved[card.id].master) totalOwned++;
        if (saved[card.id].extra) totalOwned++;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `<div>#${card.num} ${card.data.name}</div>`;

        const img = document.createElement("img");
        img.src = card.data.images.small;

        img.onclick = () => {
          index = filtered.indexOf(card);
          showZoom();
        };

        div.appendChild(img);

        const btn = document.createElement("button");
        btn.className = "card-btn " + (owned ? "owned" : "missing");
        btn.textContent = owned ? "✔" : "Needed";

        let color = "#888";
        if (currentView === "poke") color = "#e53935";
        if (currentView === "master") color = "#8e24aa";
        if (currentView === "extra") color = "#1e88e5";

        if (owned) {
          btn.style.background = color;
        }

        btn.onclick = () => {
          saved[card.id][currentView] = !saved[card.id][currentView];
          localStorage.setItem("collection", JSON.stringify(saved));
          render();
        };

        div.appendChild(btn);
        grid.appendChild(div);
      });

      document.getElementById("progress").innerHTML =
        names[currentView] + ": " + count + " / " + totals[currentView];

      document.getElementById("totalText").innerHTML =
        "TOTAL: " + totalOwned + " / 540";

      document.getElementById("fill").style.width =
        (count / totals[currentView] * 100) + "%";

      let barColor = "#888";
      if (currentView === "poke") barColor = "#e53935";
      if (currentView === "master") barColor = "#8e24aa";
      if (currentView === "extra") barColor = "#1e88e5";

      document.getElementById("fill").style.background = barColor;
    }

    function showZoom() {
      document.getElementById("zoomImg").src =
        filtered[index].data.images.large;
      document.getElementById("overlay").style.display = "flex";
    }

    document.getElementById("overlay").onclick = () => {
      document.getElementById("overlay").style.display = "none";
    };

    loadCards();
  </script>

</body>
</html>
